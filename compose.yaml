version: '3.8'

services:
  pg_documentos:
    image: docker.io/library/postgres:16-alpine
    container_name: ai_invoice_container
    restart: unless-stopped
    environment:
      POSTGRES_USER: ai_invoice_admin
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ai_invoice_db
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres_data:/var/lib/postgresql/data:Z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_invoice_admin -d ai_invoice_db"]
      interval: 10s
      timeout: 5s
      retries: 5